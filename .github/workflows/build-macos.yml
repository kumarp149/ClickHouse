name: Build ClickHouse (Linux Stable)

on:
  push:
    branches:
      - build
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      CCACHE_DIR: ~/.ccache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ✅ Install correct toolchain + deps
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-15 lld-15 \
            cmake ninja-build ccache \
            build-essential pkg-config \
            git \
            libicu-dev \
            libreadline-dev \
            libssl-dev \
            zlib1g-dev \
            libzstd-dev \
            liblz4-dev

      # ✅ Force correct compiler (CRITICAL FIX)
      - name: Set compiler
        run: |
          echo "CC=clang-15" >> $GITHUB_ENV
          echo "CXX=clang++-15" >> $GITHUB_ENV
          echo "LD=ld.lld-15" >> $GITHUB_ENV

      # ✅ ccache (safe speedup)
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: linux-ccache-v1
          restore-keys: |
            linux-ccache-

      - name: Setup ccache
        run: |
          ccache -M 5G
          ccache -s

      # ❗ Required by ClickHouse build system
      - name: Clean environment
        run: |
          unset CFLAGS
          unset CXXFLAGS
          unset LDFLAGS

      # ❗ Avoid stale/broken builds
      - name: Clean build directory
        run: rm -rf build

      # ✅ Configure
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_LINKER=$LD \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_TESTS=OFF \
            -DENABLE_UTILS=OFF \
            -DENABLE_BENCHMARKS=OFF

      # ✅ Build only main binary
      - name: Build
        run: |
          ninja -C build -j 4 clickhouse

      - name: Show ccache stats
        run: ccache -s

      - name: Strip binary
        run: |
          strip build/programs/clickhouse || true

      # ✅ Package artifact
      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp build/programs/clickhouse artifacts/
          cd artifacts
          zip -r clickhouse-linux-${GITHUB_SHA}.zip .

      # ✅ Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clickhouse-linux
          path: artifacts/*.zip
