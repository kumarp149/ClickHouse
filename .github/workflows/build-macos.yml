name: Build ClickHouse (macOS incremental + artifact)

on:
  push:
    branches:
      - build
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja ccache llvm findutils grep zip libiconv

      - name: Setup GNU tools
        run: |
          echo "$(brew --prefix findutils)/libexec/gnubin" >> $GITHUB_PATH
          echo "$(brew --prefix grep)/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup LLVM
        run: |
          LLVM_ROOT=$(brew --prefix llvm)
          echo "$LLVM_ROOT/bin" >> $GITHUB_PATH
          echo "CC=$LLVM_ROOT/bin/clang" >> $GITHUB_ENV
          echo "CXX=$LLVM_ROOT/bin/clang++" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Setup SDK
        run: |
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      # ✅ FIX: Proper libiconv integration
      - name: Setup libiconv
        run: |
          ICONV_PREFIX=$(brew --prefix libiconv)
          echo "CMAKE_PREFIX_PATH=$ICONV_PREFIX:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$ICONV_PREFIX/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "CPATH=$ICONV_PREFIX/include:$CPATH" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: macos-ccache-v1
          restore-keys: |
            macos-ccache-

      - name: Setup ccache
        run: |
          export CCACHE_DIR=~/.ccache
          ccache -M 5G
          ccache -s

      - name: Clean environment
        run: |
          unset CFLAGS
          unset CXXFLAGS
          unset LDFLAGS

      - name: Configure
        run: |
          if [ ! -f build/build.ninja ]; then
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER=$CC \
              -DCMAKE_CXX_COMPILER=$CXX \
              -DCMAKE_OSX_SYSROOT=$SDKROOT \
              -DENABLE_JEMALLOC=OFF \
              -DENABLE_TESTS=OFF \
              -DENABLE_UTILS=OFF \
              -DENABLE_BENCHMARKS=OFF \
              -DENABLE_EXAMPLES=OFF \
              -DENABLE_FUZZING=OFF \
              -DENABLE_PARQUET=OFF \
              -DENABLE_ORC=OFF \
              -DENABLE_AVRO=OFF \
              -DENABLE_MYSQL=OFF \
              -DENABLE_ODBC=OFF \
              -DENABLE_HDFS=OFF \
              -DENABLE_RUST=OFF
          fi

      - name: Build
        run: |
          ninja -C build -j 4 clickhouse

      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp build/programs/clickhouse artifacts/
          cd artifacts
          zip -r clickhouse-${GITHUB_SHA}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: clickhouse-macos
          path: artifacts/*.zip
