name: Build ClickHouse (macOS incremental + artifact)

on:
  push:
    branches:
      - build
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja ccache llvm findutils grep zip

      # GNU tools (replace BSD tools)
      - name: Setup GNU tools
        run: |
          echo "$(brew --prefix findutils)/libexec/gnubin" >> $GITHUB_PATH
          echo "$(brew --prefix grep)/libexec/gnubin" >> $GITHUB_PATH

      # LLVM toolchain (required)
      - name: Setup LLVM
        run: |
          LLVM_ROOT=$(brew --prefix llvm)
          echo "$LLVM_ROOT/bin" >> $GITHUB_PATH

          echo "CC=$LLVM_ROOT/bin/clang" >> $GITHUB_ENV
          echo "CXX=$LLVM_ROOT/bin/clang++" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      # macOS SDK fix
      - name: Setup SDK
        run: |
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      # ✅ Incremental builds (ccache)
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: macos-ccache-v1
          restore-keys: |
            macos-ccache-

      - name: Setup ccache
        run: |
          export CCACHE_DIR=~/.ccache
          export CCACHE_MAXSIZE=5G
          ccache -M 5G
          ccache -s

      # ⚡ OPTIONAL: true incremental builds (use later)
      # - name: Cache build directory
      #   uses: actions/cache@v4
      #   with:
      #     path: build
      #     key: macos-build-v1
      #     restore-keys: |
      #       macos-build-

      # 🔥 IMPORTANT: clean env (ClickHouse requirement)
      - name: Clean environment
        run: |
          unset CFLAGS
          unset CXXFLAGS
          unset LDFLAGS

      # Configure (no custom flags!)
      - name: Configure
        run: |
          if [ ! -f build/build.ninja ]; then
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER=$CC \
              -DCMAKE_CXX_COMPILER=$CXX \
              -DCMAKE_OSX_SYSROOT=$SDKROOT \
              -DUSE_INTERNAL_LIBICONV=ON \
              -DENABLE_JEMALLOC=OFF \
              -DENABLE_TESTS=OFF \
              -DENABLE_UTILS=OFF \
              -DENABLE_BENCHMARKS=OFF \
              -DENABLE_EXAMPLES=OFF \
              -DENABLE_FUZZING=OFF \
              -DENABLE_PARQUET=OFF \
              -DENABLE_ORC=OFF \
              -DENABLE_AVRO=OFF \
              -DENABLE_MYSQL=OFF \
              -DENABLE_ODBC=OFF \
              -DENABLE_HDFS=OFF \
              -DENABLE_RUST=OFF
          fi

      - name: Build (incremental)
        run: |
          ninja -C build -j 4 clickhouse

      - name: Show ccache stats
        run: |
          ccache -s

      - name: Strip binary
        run: |
          strip build/programs/clickhouse || true

      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp build/programs/clickhouse artifacts/ || true
          cp build/programs/clickhouse-client artifacts/ || true

          cd artifacts
          zip -r clickhouse-${GITHUB_SHA}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clickhouse-macos
          path: artifacts/*.zip
