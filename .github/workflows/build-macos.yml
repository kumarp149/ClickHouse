name: Build ClickHouse (macOS minimal + artifact)

on:
  push:
    branches:
      - build   # only runs on push/commit to build branch
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja ccache llvm zip

      - name: Set LLVM toolchain (required by ClickHouse)
        run: |
          echo "LLVM_ROOT=$(brew --prefix llvm)" >> $GITHUB_ENV
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

          echo "CC=$(brew --prefix llvm)/bin/clang" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix llvm)/bin/clang++" >> $GITHUB_ENV

          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Set SDKROOT (fix macOS linker issues)
        run: |
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: macos-ccache-${{ github.sha }}
          restore-keys: |
            macos-ccache-

      - name: Configure (minimal ClickHouse build)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_OSX_SYSROOT=$SDKROOT \
            -DENABLE_JEMALLOC=OFF \
            -DENABLE_TESTS=OFF \
            -DENABLE_UTILS=OFF \
            -DENABLE_BENCHMARKS=OFF \
            -DENABLE_EXAMPLES=OFF \
            -DENABLE_FUZZING=OFF \
            -DENABLE_PARQUET=OFF \
            -DENABLE_ORC=OFF \
            -DENABLE_AVRO=OFF \
            -DENABLE_MYSQL=OFF \
            -DENABLE_ODBC=OFF \
            -DENABLE_HDFS=OFF \
            -DENABLE_RUST=OFF

      - name: Build ClickHouse
        run: |
          ninja -C build clickhouse

      - name: Strip binary (reduce size)
        run: |
          strip build/programs/clickhouse || true

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts

          cp build/programs/clickhouse artifacts/ || true
          cp build/programs/clickhouse-client artifacts/ || true

      - name: Create zip archive
        run: |
          cd artifacts
          zip -r clickhouse-macos-${GITHUB_SHA}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clickhouse-macos
          path: artifacts/*.zip
