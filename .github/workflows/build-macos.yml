name: Build ClickHouse (macOS FIXED)

on:
  push:
    branches: [build]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          brew update
          brew install cmake ninja ccache llvm findutils grep zip libxml2

      - name: Setup GNU tools
        run: |
          echo "$(brew --prefix findutils)/libexec/gnubin" >> $GITHUB_PATH
          echo "$(brew --prefix grep)/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup LLVM
        run: |
          LLVM=$(brew --prefix llvm)
          echo "$LLVM/bin" >> $GITHUB_PATH
          echo "CC=$LLVM/bin/clang" >> $GITHUB_ENV
          echo "CXX=$LLVM/bin/clang++" >> $GITHUB_ENV

      - name: Setup SDK
        run: |
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      # 🔥 KEY FIX
      - name: Setup libxml2
        run: |
          XML2=$(brew --prefix libxml2)
          echo "CMAKE_PREFIX_PATH=$XML2" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$XML2/lib" >> $GITHUB_ENV
          echo "CPATH=$XML2/include" >> $GITHUB_ENV

      - name: Clean env
        run: |
          unset CFLAGS CXXFLAGS LDFLAGS

      - name: Clean build
        run: rm -rf build

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_OSX_SYSROOT=$SDKROOT \
            -DUSE_INTERNAL_LIBXML2=OFF \
            -DENABLE_JEMALLOC=OFF \
            -DENABLE_TESTS=OFF \
            -DENABLE_UTILS=OFF \
            -DENABLE_BENCHMARKS=OFF \
            -DENABLE_EXAMPLES=OFF \
            -DENABLE_FUZZING=OFF \
            -DENABLE_RUST=OFF

      - name: Build
        run: |
          ninja -C build -j 4 clickhouse

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: clickhouse
          path: build/programs/clickhouse
