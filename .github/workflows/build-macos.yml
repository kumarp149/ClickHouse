name: Build ClickHouse (Linux Stable)

on:
  push:
    branches:
      - build
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      CCACHE_DIR: ~/.ccache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ✅ Stable dependency set (don’t trim this)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld \
            cmake ninja-build ccache \
            build-essential pkg-config \
            git \
            libicu-dev \
            libreadline-dev \
            libssl-dev \
            zlib1g-dev \
            libzstd-dev \
            liblz4-dev

      # ✅ Cache only ccache (safe)
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: linux-ccache-v1
          restore-keys: |
            linux-ccache-

      - name: Setup ccache
        run: |
          ccache -M 5G
          ccache -s

      # ❗ Clean environment (ClickHouse requirement)
      - name: Clean environment
        run: |
          unset CFLAGS
          unset CXXFLAGS
          unset LDFLAGS

      # ❗ Always fresh build (avoid subtle corruption)
      - name: Clean build directory
        run: rm -rf build

      # ✅ Conservative config (don’t over-disable yet)
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_TESTS=OFF \
            -DENABLE_UTILS=OFF \
            -DENABLE_BENCHMARKS=OFF

      - name: Build
        run: |
          ninja -C build -j 4 clickhouse

      - name: Show ccache stats
        run: ccache -s

      - name: Strip binary
        run: |
          strip build/programs/clickhouse || true

      - name: Package artifact
        run: |
          mkdir -p artifacts
          cp build/programs/clickhouse artifacts/
          cd artifacts
          zip -r clickhouse-linux-${GITHUB_SHA}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clickhouse-linux
          path: artifacts/*.zip
